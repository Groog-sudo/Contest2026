services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: contest2026-postgres
    environment:
      POSTGRES_DB: contest2026
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - contest2026-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d contest2026"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  contest2026-postgres-data:
